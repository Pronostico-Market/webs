<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=/es/">
  <title>Pronóstico</title>
  <script>
    (function() {
      var lang = (navigator.language || navigator.userLanguage || 'es').slice(0,2).toLowerCase();
      var dest = '/es/';
      if (lang === 'en') dest = '/en/';
      else if (lang === 'pt') dest = '/pt/';
      window.location.href = dest;
    })();
  </script>
</head>
<body>
  <noscript><meta http-equiv="refresh" content="0;url=/es/"></noscript>
</body>
</html>
